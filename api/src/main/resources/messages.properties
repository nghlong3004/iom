# Bot reply messages
bot.start.message=Xin ch\u00E0o, m\u00ECnh l\u00E0 IOM - Input Output Money.\n\
\n\
B\u1EA1n c\u00F3 th\u1EC3 ghi thu/chi b\u1EB1ng c\u00E1ch nh\u1EAFn:\n\
  - \u0103n s\u00E1ng 30k\n\
  - \u0111\u1ED5 x\u0103ng 50k\n\
  - nh\u1EADn l\u01B0\u01A1ng 5 tri\u1EC7u\n\
\n\
G\u00F5 /help \u0111\u1EC3 xem h\u01B0\u1EDBng d\u1EABn.
bot.help.message=IOM hi\u1EC7n h\u1ED7 tr\u1EE3:\n\
\n\
/start - B\u1EAFt \u0111\u1EA7u\n\
/help - Xem h\u01B0\u1EDBng d\u1EABn\n\
/today - Xem t\u1ED5ng h\u00F4m nay\n\
/month - Xem t\u1ED5ng th\u00E1ng n\u00E0y\n\
\n\
V\u00ED d\u1EE5 ghi chi ti\u00EAu:\n\
  - \u0103n s\u00E1ng 30k\n\
  - mua s\u00E1ch 120k\n\
  - \u0111\u1ED5 x\u0103ng 50k\n\
\n\
V\u00ED d\u1EE5 ghi thu nh\u1EADp:\n\
  - nh\u1EADn l\u01B0\u01A1ng 5 tri\u1EC7u\n\
  - \u0111\u01B0\u1EE3c th\u01B0\u1EDFng 500k\n\
\n\
V\u00ED d\u1EE5 xem t\u1ED5ng / l\u1ECBch s\u1EED:\n\
  - xem t\u1ED5ng h\u00F4m nay\n\
  - th\u00E1ng n\u00E0y chi bao nhi\u00EAu\n\
  - h\u00F4m qua mua g\u00EC\n\
  - l\u1ECBch s\u1EED h\u00F4m kia
bot.unknown-command.message=M\u00ECnh ch\u01B0a h\u1ED7 tr\u1EE3 l\u1EC7nh n\u00E0y.\n\
\n\
G\u00F5 /help \u0111\u1EC3 xem c\u00E1c l\u1EC7nh hi\u1EC7n c\u00F3.
bot.fallback.message=IOM ch\u01B0a hi\u1EC3u tin nh\u1EAFn n\u00E0y. B\u1EA1n c\u00F3 th\u1EC3 th\u1EED:\n\
  - \u0103n s\u00E1ng 30k\n\
  - \u0111\u1ED5 x\u0103ng 50k\n\
  - l\u01B0\u01A1ng th\u00E1ng n\u00E0y 5tr\n\
  - xem t\u1ED5ng h\u00F4m nay\n\
  - lunch $12\n\
\n\
G\u00F5 /help \u0111\u1EC3 xem h\u01B0\u1EDBng d\u1EABn.

