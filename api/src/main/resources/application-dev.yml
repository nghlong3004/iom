server:
  port: ${SERVER_PORT:8080}

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iom_dev}
    username: ${DB_USERNAME:iom}
    password: ${DB_PASSWORD:iom}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    me.nghlong3004.iom: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.telegram: INFO

iom:
  telegram:
    enabled: ${TELEGRAM_BOT_ENABLED:true}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
  client:
    base-url: ${WEB_BASE_URL}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-expiration: 15
      refresh-expiration: 10080
    cookie:
      secure: false
      same-site: lax