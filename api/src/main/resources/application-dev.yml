server:
  port: ${SERVER_PORT:8080}

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iom_dev}
    username: ${DB_USERNAME:iom}
    password: ${DB_PASSWORD:iom}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
          temperature: 0
          max-tokens: ${DEEPSEEK_MAX_TOKENS:512}
          response-format:
            type: json_object

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    me.nghlong3004.iom: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.telegram: INFO

iom:
  bot:
    intents:
      summary:
        action-keywords: [xem, tong, thong ke, bao nhieu, bao cao]
        today-keywords: [hom nay, ngay nay, today]
        yesterday-keywords: [hom qua, yesterday]
        day-before-keywords: [hom kia]
        this-week-keywords: [tuan nay, tuan, week]
        month-keywords: [thang nay, month]
        expense-keywords: [chi, tieu, chi tieu]
        income-keywords: [thu, thu nhap, luong]
        detail-keywords: [mua gi, chi gi, lich su, danh sach, chi tiet, nhung gi]
      manage-action:
        delete-keywords: [xoa, xóa, delete, bo, bỏ]
        update-keywords: [sua, sửa, update, doi, đổi, chinh, chỉnh]
        undo-keywords: [undo, hoan tac, hoàn tác]
        confirm-keywords: [ok, co, có, dong y, đồng ý, uh, ừ]
        cancel-keywords: [huy, hủy, khong, không, thoi, thôi]
        latest-keywords: [vua roi, vừa rồi, cuoi, cuối, moi nhat, mới nhất]
        index-pattern: "(?:so|số)\\s*(\\d+)"
  telegram:
    enabled: ${TELEGRAM_BOT_ENABLED:true}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
  client:
    base-url: ${WEB_BASE_URL}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-expiration: 15
      refresh-expiration: 10080
    cookie:
      secure: false
      same-site: lax
